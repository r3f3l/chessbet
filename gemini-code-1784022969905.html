<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessBet TV - Portal do obstawiania szachów</title>
    <!-- Używamy Tailwind CSS do szybkiego i nowoczesnego wyglądu -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans selection:bg-yellow-400 selection:text-black">
    
    <!-- Nagłówek -->
    <header class="text-center py-6 bg-gray-800 shadow-xl border-b border-gray-700">
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-200">
            ♟️ ChessBet TV
        </h1>
        <p class="text-gray-400 text-sm mt-2 uppercase tracking-widest">Obstawiaj na żywo i wygrywaj</p>
    </header>

    <!-- Główny kontener -->
    <main class="max-w-4xl mx-auto mt-10 p-4 flex flex-col items-center">
        
        <!-- Lichess TV Embed -->
        <div class="w-full flex justify-center mb-10 relative">
            <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-purple-600 rounded-lg blur opacity-25"></div>
            <iframe 
                src="https://lichess.org/tv/frame?theme=brown&bg=dark"
                style="width: 400px; height: 444px;"
                allowtransparency="true"
                frameborder="0"
                class="relative rounded-lg shadow-2xl border border-gray-700 bg-gray-800">
            </iframe>
        </div>

        <!-- Panel obstawiania -->
        <div class="w-full max-w-2xl bg-gray-800 rounded-2xl p-8 shadow-2xl border border-gray-700">
            <h2 class="text-2xl font-semibold mb-6 text-center text-gray-100 flex items-center justify-center gap-2">
                🎫 Twój Kupon
            </h2>
            
            <!-- Zakłady podstawowe -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button class="bet-btn group relative bg-gray-700 hover:bg-gray-600 transition-all p-4 rounded-xl flex justify-between items-center border border-gray-600 overflow-hidden" data-bet="White Win" data-odds="1:1">
                    <span class="text-lg font-medium text-gray-200 group-hover:text-white relative z-10">⚪ White Win</span>
                    <span class="text-xl font-black text-yellow-400 relative z-10">1:1</span>
                </button>
                <button class="bet-btn group relative bg-gray-700 hover:bg-gray-600 transition-all p-4 rounded-xl flex justify-between items-center border border-gray-600 overflow-hidden" data-bet="Black Win" data-odds="1:1">
                    <span class="text-lg font-medium text-gray-200 group-hover:text-white relative z-10">⚫ Black Win</span>
                    <span class="text-xl font-black text-yellow-400 relative z-10">1:1</span>
                </button>
            </div>

            <div class="relative flex items-center py-5">
                <div class="flex-grow border-t border-gray-600"></div>
                <span class="flex-shrink-0 mx-4 text-gray-400 text-sm uppercase tracking-wide">Zakłady na Matowanie</span>
                <div class="flex-grow border-t border-gray-600"></div>
            </div>

            <!-- Zakłady na figurę matującą -->
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                <button class="bet-btn bg-gray-700 hover:bg-purple-900/50 transition-all p-4 rounded-xl flex flex-col items-center justify-center border border-gray-600 hover:border-purple-500" data-bet="Queen Mate" data-odds="1:1">
                    <span class="text-gray-300">👑 Queen Mate</span>
                    <span class="text-xl font-bold text-yellow-400 mt-2">1:1</span>
                </button>
                <button class="bet-btn bg-gray-700 hover:bg-purple-900/50 transition-all p-4 rounded-xl flex flex-col items-center justify-center border border-gray-600 hover:border-purple-500" data-bet="Rook Mate" data-odds="1:3">
                    <span class="text-gray-300">🏰 Rook Mate</span>
                    <span class="text-xl font-bold text-yellow-400 mt-2">1:3</span>
                </button>
                <button class="bet-btn bg-gray-700 hover:bg-purple-900/50 transition-all p-4 rounded-xl flex flex-col items-center justify-center border border-gray-600 hover:border-purple-500" data-bet="Bishop Mate" data-odds="1:6">
                    <span class="text-gray-300">📐 Bishop Mate</span>
                    <span class="text-xl font-bold text-yellow-400 mt-2">1:6</span>
                </button>
                <button class="bet-btn bg-gray-700 hover:bg-purple-900/50 transition-all p-4 rounded-xl flex flex-col items-center justify-center border border-gray-600 hover:border-purple-500" data-bet="Knight Mate" data-odds="1:6">
                    <span class="text-gray-300">🐴 Knight Mate</span>
                    <span class="text-xl font-bold text-yellow-400 mt-2">1:6</span>
                </button>
                <!-- Centralny przycisk w nowym wierszu dla nieparzystej liczby -->
                <button class="bet-btn bg-gray-700 hover:bg-purple-900/50 transition-all p-4 rounded-xl flex flex-col items-center justify-center border border-gray-600 hover:border-purple-500 sm:col-start-2" data-bet="Pawn Mate" data-odds="1:10">
                    <span class="text-gray-300">♟️ Pawn Mate</span>
                    <span class="text-xl font-bold text-yellow-400 mt-2">1:10</span>
                </button>
            </div>
            
            <!-- Podsumowanie (zmienia się po kliknięciu) -->
            <div id="bet-summary" class="mt-8 p-4 bg-gray-900 rounded-lg text-center border border-gray-700 hidden">
                <p class="text-gray-300">Wybrany zakład: <span id="summary-name" class="font-bold text-white"></span></p>
                <p class="text-gray-300">Potencjalna wygrana (kurs): <span id="summary-odds" class="font-bold text-yellow-400"></span></p>
            </div>
        </div>
    </main>

    <!-- Czysty JavaScript ("Banana" 🍌) -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const buttons = document.querySelectorAll('.bet-btn');
            const summaryBox = document.getElementById('bet-summary');
            const summaryName = document.getElementById('summary-name');
            const summaryOdds = document.getElementById('summary-odds');

            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Reset styling dla wszystkich przycisków
                    buttons.forEach(b => {
                        b.classList.remove('ring-2', 'ring-yellow-400', 'bg-gray-600');
                        b.classList.add('bg-gray-700');
                    });
                    
                    // Podświetlenie klikniętego przycisku
                    btn.classList.add('ring-2', 'ring-yellow-400', 'bg-gray-600');
                    btn.classList.remove('bg-gray-700');
                    
                    // Pobranie danych zakładu z atrybutów 'data-*'
                    const betType = btn.getAttribute('data-bet');
                    const betOdds = btn.getAttribute('data-odds');
                    
                    // Wyświetlenie podsumowania na dole panelu
                    summaryName.textContent = betType;
                    summaryOdds.textContent = betOdds;
                    summaryBox.classList.remove('hidden');
                });
            });
        });
    </script>
</body>
</html>
