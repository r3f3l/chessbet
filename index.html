<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lichess Stakes MVP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .lichess-board { border: 12px solid #1f2937; border-radius: 12px; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-3xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-2">♟️ Lichess Stakes</h1>
    <p class="text-center text-gray-400 mb-10">Graj o wirtualne pieniądze</p>

    <!-- Wallet -->
    <div class="bg-gray-900 rounded-2xl p-5 flex justify-between items-center mb-8">
      <div>
        <span class="text-gray-400">Twój portfel</span>
        <div class="text-3xl font-bold text-green-400">1250 zł</div>
      </div>
      <div class="text-right">
        <span class="text-gray-400">Twoje konto</span>
        <div class="font-semibold">@TwojLichess123</div>
      </div>
    </div>

    <!-- Create Button -->
    <button onclick="showCreateModal()" 
            class="fixed bottom-8 right-8 bg-green-600 hover:bg-green-500 text-xl px-8 py-4 rounded-2xl font-semibold shadow-2xl flex items-center gap-3 z-50">
      <i class="fas fa-plus"></i> Utwórz zaproszenie
    </button>

    <!-- Lobby -->
    <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
      <i class="fas fa-list"></i> Otwarte zaproszenia
    </h2>
    <div id="lobby" class="space-y-4"></div>
  </div>

  <!-- Create Modal -->
  <div id="createModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[100]">
    <div class="bg-gray-900 w-full max-w-md mx-4 rounded-3xl p-8">
      <h3 class="text-2xl font-bold mb-6">Nowe zaproszenie</h3>
      
      <div class="space-y-6">
        <div>
          <label class="block text-sm text-gray-400 mb-2">Format gry (Lichess)</label>
          <select id="formatSelect" class="w-full bg-gray-800 p-4 rounded-2xl text-lg">
            <option value="0">Bullet 1+0</option>
            <option value="1">Bullet 2+1</option>
            <option value="2" selected>Blitz 3+0</option>
            <option value="3">Blitz 5+3</option>
            <option value="4">Rapid 10+0</option>
            <option value="5">Rapid 15+10</option>
            <option value="6">Classical 30+20</option>
          </select>
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-2">Stawka wirtualna</label>
          <div class="flex items-center gap-4 bg-gray-800 p-4 rounded-2xl">
            <input id="stakeInput" type="number" value="50" class="bg-transparent text-4xl font-bold w-24 focus:outline-none">
            <span class="text-2xl text-gray-400">zł</span>
          </div>
        </div>

        <div class="flex gap-4">
          <button onclick="hideCreateModal()" 
                  class="flex-1 py-4 bg-gray-700 hover:bg-gray-600 rounded-2xl font-medium">Anuluj</button>
          <button onclick="createChallenge()" 
                  class="flex-1 py-4 bg-green-600 hover:bg-green-500 rounded-2xl font-semibold">Utwórz zaproszenie</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Game Modal -->
  <div id="gameModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[200]">
    <div class="max-w-2xl w-full p-4">
      <div class="flex justify-between mb-4">
        <div id="gameInfo" class="text-xl"></div>
        <button onclick="hideGameModal()" class="text-red-400 text-xl">✕</button>
      </div>
      
      <!-- Lichess Embed Example -->
      <div class="lichess-board bg-gray-900 p-4 rounded-3xl">
        <iframe id="lichessEmbed" 
                width="100%" 
                height="500" 
                src="https://lichess.org/embed/game/abc123?theme=auto&bg=auto" 
                allow="fullscreen" 
                class="rounded-2xl"></iframe>
      </div>

      <div class="mt-6 text-center text-sm text-gray-400">
        Gra toczy się na Lichess • Po zakończeniu nastąpi automatyczne rozliczenie
      </div>
    </div>
  </div>

  <script>
    const formats = [
      "Bullet 1+0", "Bullet 2+1", "Blitz 3+0", "Blitz 5+3",
      "Rapid 10+0", "Rapid 15+10", "Classical 30+20"
    ];

    let challenges = [
      { id: 1, username: "MagnusCarlsen", rating: 2850, format: "Blitz 5+3", stake: 100, status: "open" },
      { id: 2, username: "HikaruNakamura", rating: 2780, format: "Bullet 1+0", stake: 75, status: "open" },
      { id: 3, username: "GukeshD", rating: 2720, format: "Rapid 10+0", stake: 50, status: "open" }
    ];

    function renderLobby() {
      const lobby = document.getElementById('lobby');
      lobby.innerHTML = challenges.map(ch => `
        <div class="bg-gray-900 hover:bg-gray-800 transition p-6 rounded-3xl flex items-center justify-between">
          <div>
            <div class="text-2xl font-bold">${ch.username}</div>
            <div class="text-gray-400">${ch.rating} • ${ch.format}</div>
          </div>
          <div class="text-right">
            <div class="text-4xl font-bold text-green-400">${ch.stake} zł</div>
            <button onclick="acceptChallenge(${ch.id})" 
                    class="mt-4 bg-green-600 hover:bg-green-500 px-10 py-3 rounded-2xl font-semibold text-sm">
              PRZYJMij ZAPROSZENIE
            </button>
          </div>
        </div>
      `).join('');
    }

    function showCreateModal() {
      document.getElementById('createModal').classList.remove('hidden');
    }

    function hideCreateModal() {
      document.getElementById('createModal').classList.add('hidden');
    }

    function createChallenge() {
      const formatIndex = document.getElementById('formatSelect').value;
      const stake = document.getElementById('stakeInput').value;
      
      challenges.unshift({
        id: Date.now(),
        username: "@TwojLichess123",
        rating: 1650,
        format: formats[formatIndex],
        stake: parseInt(stake),
        status: "open"
      });
      
      renderLobby();
      hideCreateModal();
      alert("Zaproszenie utworzone! Widoczne w lobby.");
    }

    function acceptChallenge(id) {
      const ch = challenges.find(c => c.id === id);
      if (!ch) return;
      
      document.getElementById('gameInfo').innerHTML = `
        Gra z <strong>${ch.username}</strong> • ${ch.format} • Stawka: <strong>${ch.stake} zł</strong>
      `;
      
      document.getElementById('gameModal').classList.remove('hidden');
      
      // Symulacja końca gry po 8 sekundach
      setTimeout(() => {
        if (!document.getElementById('gameModal').classList.contains('hidden')) {
          alert(`Gra zakończona! Wygrałeś ${ch.stake} zł 🎉`);
          hideGameModal();
          // Usuń z lobby
          challenges = challenges.filter(c => c.id !== id);
          renderLobby();
        }
      }, 8000);
    }

    function hideGameModal() {
      document.getElementById('gameModal').classList.add('hidden');
    }

    // Start
    renderLobby();
  </script>
</body>
</html>
