<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChessBet - Gram o stawkę</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top, #146b2b, #072e10);
            --header-bg: rgba(7, 46, 16, 0.9);
            --card-bg: #ffffff;
            --primary: #072e10; 
            --accent: #d4af37; 
            --accent-hover: #f1c40f;
            --text-main: #333333;
            --text-light: #ffffff;
            --text-muted: #7f8c8d;
            --border: #e0e6ed;
            --danger: #e74c3c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body { 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            color: var(--text-main); 
            padding-bottom: 80px; 
            min-height: 100vh;
        }

        header { 
            background: var(--header-bg); 
            color: var(--text-light); 
            padding: 20px; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            backdrop-filter: blur(5px);
            border-bottom: 2px solid var(--accent);
        }
        h1 { font-weight: 800; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); margin-bottom: 5px; }
        h1 span { color: var(--accent); }
        
        .subtitle { font-size: 0.85rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

        .wallet-container { display: flex; justify-content: space-around; margin-top: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 12px; border: 1px solid rgba(212, 175, 55, 0.3); }
        .wallet-item { display: flex; flex-direction: column; align-items: center; }
        .wallet-label { font-size: 0.75rem; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); }
        .wallet-amount { font-size: 1.3rem; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .pending { color: #f39c12; }

        .container { padding: 15px; }
        .section-title { font-size: 1.2rem; margin-bottom: 15px; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        .challenge-card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 18px; 
            margin-bottom: 18px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); 
            border: 2px solid transparent; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .player-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; border: 2px solid var(--accent); box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
        .username { font-weight: 800; font-size: 1.15rem; color: var(--primary); }
        .rating { color: var(--text-muted); font-size: 0.9rem; font-weight: 600; }
        
        .match-details { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 12px; border-radius: 10px; font-size: 0.95rem; border: 1px solid #e0e0e0; }
        .stake { font-weight: 900; color: var(--primary); font-size: 1.3rem; background: rgba(212, 175, 55, 0.2); padding: 5px 10px; border-radius: 8px; border: 1px solid var(--accent); }

        button { 
            border: none; 
            border-radius: 10px; 
            padding: 14px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1.05rem; 
            width: 100%; 
            transition: all 0.2s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .btn-accept { background: linear-gradient(135deg, var(--accent), #b5952f); color: var(--primary); }
        .btn-accept:active { transform: translateY(2px); }
        
        .fab { position: fixed; bottom: 25px; right: 25px; background: linear-gradient(135deg, var(--accent), #b5952f); color: var(--primary); width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; box-shadow: 0 6px 20px rgba(0,0,0,0.4); cursor: pointer; z-index: 1000; border: 2px solid #fff; padding: 0; }
        .fab:active { transform: scale(0.95); }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(3px); display: none; align-items: flex-end; z-index: 2000; }
        .modal-content { background: var(--card-bg); width: 100%; border-radius: 24px 24px 0 0; padding: 30px 25px; box-shadow: 0 -10px 25px rgba(0,0,0,0.5); }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 800; color: var(--primary); text-transform: uppercase; font-size: 0.85rem; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 1.05rem; background: #f8f9fa; }
        
        .bet-rule-box { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--accent); padding: 12px; border-radius: 10px; color: var(--accent); font-weight: 800; text-align: center; font-size: 0.95rem; text-transform: uppercase; }

        .btn-close { background: #e0e0e0; color: var(--text-main); margin-top: 15px; }
    </style>
</head>
<body>

    <header>
        <h1>Chess<span>Bet</span></h1>
        <p class="subtitle">Graj z najlepszymi na pieniądze</p>
        <div class="wallet-container">
            <div class="wallet-item">
                <span class="wallet-label">Dostępne żetony</span>
                <span class="wallet-amount" id="balance-available">150.00 PLN</span>
            </div>
            <div class="wallet-item">
                <span class="wallet-label">W grze / Escrow</span>
                <span class="wallet-amount pending" id="balance-pending">50.00 PLN</span>
            </div>
        </div>
    </header>

    <div class="container">
        <h2 class="section-title">Otwarte stoły</h2>
        <div id="challenges-list"></div>
    </div>

    <button class="fab" id="btn-fab">+</button>

    <div class="modal-overlay" id="create-modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px;">Otwórz nowy stół</h2>
            
            <div class="form-group">
                <label>Format gry</label>
                <select id="game-format">
                    <option value='{"limit": 3, "inc": 0, "label": "⚡ Blitz 3+0"}'>⚡ Blitz 3+0</option>
                    <option value='{"limit": 5, "inc": 0, "label": "⚡ Blitz 5+0"}'>⚡ Blitz 5+0</option>
                    <option value='{"limit": 10, "inc": 5, "label": "⏱️ Rapid 10+5"}'>⏱️ Rapid 10+5</option>
                </select>
            </div>

            <div class="form-group">
                <label>Stawka zakładu (PLN)</label>
                <input type="number" id="bet-amount" value="20" min="5" max="150">
            </div>

            <div class="form-group">
                <label>Zasada zakładu</label>
                <div class="bet-rule-box">🏆 Zawsze stawiasz na swoją wygraną</div>
            </div>

            <button class="btn-accept" id="btn-create">Zablokuj żetony i graj</button>
            <button class="btn-close" id="btn-close-modal">Anuluj</button>
        </div>
    </div>

    <script>
        // --- LOGIKA APLIKACJI (Bez Audio) ---
        let challenges = [];

        // Inicjalizacja nasłuchiwaczy zdarzeń po załadowaniu DOM
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btn-fab').addEventListener('click', openModal);
            document.getElementById('btn-close-modal').addEventListener('click', closeModal);
            document.getElementById('btn-create').addEventListener('click', createChallenge);
            
            renderChallenges();
        });

        function openModal() { 
            document.getElementById('create-modal').style.display = 'flex'; 
        }
        
        function closeModal() { 
            document.getElementById('create-modal').style.display = 'none'; 
        }

        function renderChallenges() {
            const list = document.getElementById('challenges-list');
            list.innerHTML = '';
            
            if (challenges.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: rgba(255,255,255,0.7); padding: 30px; font-size: 1.1rem;">Brak wolnych stołów. Otwórz swój własny!</p>';
                return;
            }

            challenges.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'challenge-card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="player-info">
                            <div class="avatar">${ch.user.charAt(0)}</div>
                            <div>
                                <div class="username">${ch.user}</div>
                                <div class="rating">Ranking: ${ch.rating}</div>
                            </div>
                        </div>
                    </div>
                    <div class="match-details">
                        <span>${ch.label}</span>
                        <span class="stake">${ch.stake} PLN</span>
                    </div>
                `;
                
                const btnAccept = document.createElement('button');
                btnAccept.className = 'btn-accept';
                btnAccept.innerText = `Wchodzę do gry (${ch.stake} PLN)`;
                btnAccept.addEventListener('click', () => acceptChallenge(ch.id));
                
                card.appendChild(btnAccept);
                list.appendChild(card);
            });
        }
