<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHESSBET CASINO - Beat the Dealer!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b3b24; background-image: radial-gradient(circle at 50% 0%, #115e3a 0%, #0b3b24 60%, #051e11 100%); }
        .vegas-logo { font-family: 'Times New Roman', Times, serif; text-transform: uppercase; background: linear-gradient(180deg, #FFF7D6 0%, #FFD700 25%, #B8860B 50%, #FFD700 75%, #FFF7D6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0px 6px 0px #4A0E00) drop-shadow(0px 10px 15px rgba(0,0,0,0.8)); letter-spacing: 3px; }
        .casino-panel { background-color: rgba(4, 26, 15, 0.85); box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(218, 165, 32, 0.15); }
        .glow-casino-active { background: linear-gradient(180deg, #7f1d1d 0%, #450a0a 100%) !important; border-color: #fbbf24 !important; box-shadow: 0 0 25px rgba(251, 191, 36, 0.5), inset 0 0 15px rgba(251, 191, 36, 0.3) !important; transform: scale(1.03); }
        .chess-icon { font-family: 'Times New Roman', Times, serif; }
    </style>
</head>
<body class="text-amber-50 min-h-screen font-sans pb-20">
    
    <header class="text-center py-6 bg-[#06180e] border-b-8 border-double border-yellow-500 relative overflow-hidden">
        <h1 class="vegas-logo text-3xl sm:text-5xl font-black mt-1 mb-2">👑 CHESSBET CASINO 👑</h1>
    </header>

    <main class="max-w-[1400px] mx-auto mt-6 p-4 flex flex-col lg:flex-row gap-8 items-start">
        
        <div class="w-full lg:w-2/3 casino-panel rounded-3xl p-6 sm:p-8 border-2 border-yellow-600/60 relative">
            <div id="lock-overlay" class="absolute inset-0 bg-[#06180e]/95 z-30 flex flex-col items-center justify-center backdrop-blur-md hidden">
                 <h2 id="loading-text" class="text-2xl font-black text-yellow-500 animate-pulse">Initializing Casino...</h2>
            </div>

            <div id="player-profile" class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-[#061a10] border-2 border-yellow-500 rounded-xl p-4">
                    <span class="text-[10px] text-yellow-600 font-black uppercase">White (♔)</span>
                    <div id="white-player" class="font-bold text-white truncate">Waiting...</div>
                </div>
                <div class="bg-[#061a10] border-2 border-yellow-500 rounded-xl p-4">
                    <span class="text-[10px] text-yellow-600 font-black uppercase">Black (♚)</span>
                    <div id="black-player" class="font-bold text-white truncate">Waiting...</div>
                </div>
            </div>

            <h2 class="text-center text-xl font-black text-yellow-500 mb-6 uppercase">Place Your Bets</h2>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button class="bet-btn group bg-[#0d4a2a] hover:bg-[#136138] p-4 rounded-2xl border-2 border-yellow-700/50 flex flex-col items-center" data-group="main" data-bet="White Win" data-decimal="2.00">
                    <span class="text-3xl">♔</span> <span>White Win</span>
                </button>
                <button class="bet-btn group bg-[#0d4a2a] hover:bg-[#136138] p-4 rounded-2xl border-2 border-yellow-700/50 flex flex-col items-center" data-group="main" data-bet="Black Win" data-decimal="2.00">
                    <span class="text-3xl">♚</span> <span>Black Win</span>
                </button>
            </div>
            <p class="text-center text-red-400 text-xs font-bold mb-4 uppercase italic">* Note: Draw/Stalemate = House Wins</p>

            <div id="payment-module" class="mt-8 p-5 bg-[#03140b] rounded-2xl border-2 border-yellow-600 hidden">
                <input type="number" id="stake" min="1" placeholder="Stake ($)" class="w-full bg-[#0a3a21] border-2 border-yellow-700 rounded-xl p-3 text-white font-bold mb-4">
                <button id="pay-btn" class="w-full bg-yellow-500 text-black font-black py-3 rounded-xl uppercase">Place Bet</button>
            </div>
            <div id="active-tickets-section" class="mt-8 pt-6 border-t-2 border-yellow-900/50 hidden">
                <div id="tickets-container" class="space-y-3"></div>
            </div>
        </div>

        <div class="w-full lg:w-1/3 flex flex-col items-center lg:sticky lg:top-8">
            <iframe id="lichess-iframe" src="" class="w-full h-full aspect-[400/444] bg-[#06180e] rounded-2xl border-4 border-yellow-600"></iframe>
        </div>
    </main>

    <div id="result-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-[60] hidden">
        <div class="bg-[#06180e] border-4 border-yellow-500 rounded-2xl w-full max-w-lg p-8 text-center">
            <h2 id="result-title" class="text-3xl font-black mb-4">GAME RESULT</h2>
            <div id="modal-bets-list" class="space-y-2 mb-6"></div>
            <p id="result-payout" class="text-2xl font-black mb-6">Payout: $0.00</p>
            <button id="next-game-btn" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl uppercase">Find Next Game</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // UI References
            const lockOverlay = document.getElementById('lock-overlay');
            const loadingText = document.getElementById('loading-text');
            const whitePlayerEl = document.getElementById('white-player');
            const blackPlayerEl = document.getElementById('black-player');
            const lichessIframe = document.getElementById('lichess-iframe');
            
            let currentLiveId = null;
            let activeTickets = [];

            // --- 1. CORE LOGIC ---
            async function fetchCurrentTvGame() {
                try {
                    const res = await fetch(`https://lichess.org/api/tv/channels?_=${Date.now()}`);
                    const data = await res.json();
                    const channel = data.topRated || data.blitz || Object.values(data)[0];
                    return channel ? channel.gameId : null;
                } catch(e) { return null; }
            }

            async function fetchGameMetadata(gameId) {
                try {
                    const res = await fetch(`https://lichess.org/game/export/${gameId}?tags=true`);
                    return await res.json();
                } catch(e) { return null; }
            }

            async function initTable() {
                lockOverlay.classList.remove('hidden');
                loadingText.textContent = "Scanning Lichess TV...";
                
                const gameId = await fetchCurrentTvGame();
                if (!gameId) {
                    loadingText.textContent = "Waiting for game...";
                    setTimeout(initTable, 6000);
                    return;
                }

                currentLiveId = gameId;
                const meta = await fetchGameMetadata(gameId);
                
                if (meta && meta.players) {
                    whitePlayerEl.textContent = `${meta.players.white.user?.name || 'Anonymous'} (${meta.players.white.rating})`;
                    blackPlayerEl.textContent = `${meta.players.black.user?.name || 'Anonymous'} (${meta.players.black.rating})`;
                }

                lichessIframe.src = `https://lichess.org/embed/${gameId}?theme=brown&bg=dark`;
                lockOverlay.classList.add('hidden');
                startMonitor();
            }

            function startMonitor() {
                const interval = setInterval(async () => {
                    const gameId = await fetchCurrentTvGame();
                    if (gameId !== currentLiveId) {
                        clearInterval(interval);
                        finalizeGame(currentLiveId);
                    }
                }, 8000);
            }

            async function finalizeGame(gameId) {
                loadingText.textContent = "Calculating Payouts...";
                lockOverlay.classList.remove('hidden');
                
                const meta = await fetchGameMetadata(gameId);
                if (!meta) { setTimeout(initTable, 5000); return; }

                // LOGIKA: Draw/Stalemate = House Wins
                const isDraw = (meta.status === 'draw' || meta.status === 'stalemate');
                const winner = isDraw ? 'none' : meta.winner;

                // Processing logic remains similar but with draw-loss enforced
                showResult(winner, meta);
            }

            function showResult(winner, meta) {
                const resultModal = document.getElementById('result-modal');
                const modalBetsList = document.getElementById('modal-bets-list');
                const payoutText = document.getElementById('result-payout');
                
                let totalPayout = 0;
                let wonAny = false;

                activeTickets.forEach(t => {
                    let won = false;
                    // Logic: If draw, you cannot win
                    if (winner !== 'none') {
                        t.bets.forEach(b => {
                            if (b.type === 'White Win' && winner === 'white') won = true;
                            if (b.type === 'Black Win' && winner === 'black') won = true;
                        });
                    }
                    
                    if (won) { totalPayout += t.win; wonAny = true; }
                    modalBetsList.innerHTML += `<div class="${won ? 'text-green-500' : 'text-red-500'} font-bold">${t.bets.map(b=>b.type).join(' + ')}: ${won ? '+'+t.win : '-'+t.stake}</div>`;
                });

                payoutText.textContent = wonAny ? `Profit: $${totalPayout.toFixed(2)}` : "Result: House Wins";
                resultModal.classList.remove('hidden');
            }

            document.getElementById('next-game-btn').onclick = () => {
                document.getElementById('result-modal').classList.add('hidden');
                initTable();
            };

            // Payment Logic
            document.getElementById('pay-btn').onclick = () => {
                const stake = parseFloat(document.getElementById('stake').value);
                const odds = parseFloat(document.getElementById('total-odds').textContent);
                const win = stake * odds;
                const bets = [];
                document.querySelectorAll('.glow-casino-active').forEach(b => bets.push({type: b.getAttribute('data-bet')}));
                
                activeTickets.push({bets, stake, win, gameId: currentLiveId});
                document.getElementById('active-tickets-section').classList.remove('hidden');
                document.getElementById('tickets-container').innerHTML += `<div class="bg-gray-800 p-2 text-white">Ticket ${bets.map(b=>b.type).join(', ')} - Stake: $${stake}</div>`;
            };

            // Toggle Bet
            document.querySelectorAll('.bet-btn').forEach(btn => {
                btn.onclick = () => {
                    btn.classList.toggle('glow-casino-active');
                    let odds = 1.0;
                    document.querySelectorAll('.glow-casino-active').forEach(b => odds *= parseFloat(b.getAttribute('data-decimal')));
                    document.getElementById('total-odds').textContent = odds.toFixed(2);
                    document.getElementById('payment-module').classList.toggle('hidden', document.querySelectorAll('.glow-casino-active').length === 0);
                }
            });

            initTable();
        });
    </script>
</body>
</html>
