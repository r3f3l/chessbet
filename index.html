<!DOCTYPE html>
<html>
<body>
    <h1>TEST POBIERANIA DANYCH</h1>
    <div id="out" style="font-family: monospace; white-space: pre-wrap; color: blue;">Ładowanie...</div>

    <script>
        async function test() {
            const out = document.getElementById('out');
            try {
                out.textContent = "Startuję fetch...";
                const res = await fetch('https://lichess.org/api/tv/channels');
                out.textContent += "\nStatus fetch: " + res.status;
                const data = await res.json();
                out.textContent += "\nJSON pobrany!";
                out.textContent += "\nKlucze w JSONie: " + Object.keys(data).join(", ");
                
                // Sprawdzamy pierwszy lepszy kanał
                const key = Object.keys(data)[0];
                out.textContent += "\n\nPrzykład danych z kanału '" + key + "':\n" + JSON.stringify(data[key], null, 2);
            } catch (e) {
                out.style.color = "red";
                out.textContent = "BŁĄD KRYTYCZNY: " + e.message;
            }
        }
        test();
    </script>
</body>
</html>
