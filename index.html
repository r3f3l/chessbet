<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DEBUGGER KASYNA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-green-500 p-10 font-mono">
    <h1 class="text-2xl mb-4 text-white">DIAGNOSTYKA API</h1>
    <div id="debug-view" class="bg-slate-900 p-4 rounded border border-green-500 whitespace-pre-wrap">
        Ładowanie danych...
    </div>

    <script>
        async function debugAPI() {
            const display = document.getElementById('debug-view');
            try {
                // Pobieramy dane
                const res = await fetch('https://lichess.org/api/tv/channels');
                const data = await res.json();
                
                // Wyświetlamy surowy JSON na stronie, żebyśmy widzieli strukturę
                display.textContent = "ODPOWIEDŹ Z SERWERA:\n" + JSON.stringify(data, null, 2);
                
                // Sprawdzamy czy mamy cokolwiek w "topRated" (lub odpowiedniku)
                if (data.topRated) {
                    display.textContent += "\n\nSUKCES: Znaleziono 'topRated'!";
                } else {
                    display.textContent += "\n\nUWAGA: Nie widzę 'topRated'. Sprawdź, czy klucze to np. 'blitz', 'bullet' itp.";
                }
            } catch (e) {
                display.textContent = "BŁĄD: " + e.message;
            }
        }
        debugAPI();
    </script>
</body>
</html>
