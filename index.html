<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHESSBET CASINO - Live & Side Bets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #051e11; 
            background-image: radial-gradient(circle at 50% 0%, #0a3a21 0%, #051e11 60%, #020a06 100%);
            color: #fef3c7; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .vegas-logo { 
            font-family: 'Times New Roman', Times, serif; 
            text-transform: uppercase;
            background: linear-gradient(180deg, #FFF7D6 0%, #FFD700 25%, #B8860B 50%, #FFD700 75%, #FFF7D6 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0px 6px 0px #4A0E00); 
            letter-spacing: 2px;
        }
        .casino-panel { 
            background-color: rgba(4, 26, 15, 0.9); 
            border: 2px solid #d97706; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(218, 165, 32, 0.1);
        }
        .bet-btn {
            background-color: #0d4a2a; 
            border: 2px solid rgba(217, 119, 6, 0.4);
            transition: all 0.2s ease;
        }
        .bet-btn:hover { background-color: #136138; }
        .glow-casino-active { 
            background: linear-gradient(180deg, #7f1d1d 0%, #450a0a 100%) !important;
            border-color: #fbbf24 !important; 
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.5), inset 0 0 10px rgba(251, 191, 36, 0.3) !important; 
            transform: scale(1.02);
            color: white !important;
        }
        .wallet-display {
            background: linear-gradient(180deg, #b45309, #78350f);
            border: 2px solid #fbbf24;
        }
        .chess-icon { font-family: 'Times New Roman', Times, serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #b45309; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-6 min-h-screen">
    
    <header class="max-w-[1400px] mx-auto flex flex-col md:flex-row justify-between items-center mb-6 gap-4 border-b-2 border-yellow-700/50 pb-4">
        <h1 class="vegas-logo text-3xl sm:text-5xl font-black">👑 CHESSBET CASINO 👑</h1>
        <div class="wallet-display px-6 py-2 rounded-xl text-white font-black text-2xl flex items-center gap-2 shadow-lg">
            <span class="text-xs text-yellow-300 uppercase tracking-widest mt-1">Wallet:</span>
            <span id="wallet-balance">$1000.00</span>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto grid lg:grid-cols-[1fr_400px] gap-8 items-start">
        
        <!-- LEFT COLUMN: BETTING & PROFILES -->
        <div class="flex flex-col gap-6">
            
            <div class="casino-panel p-6 sm:p-8 rounded-2xl relative">
                
                <div id="status" class="text-center text-sm font-black text-yellow-500 mb-6 uppercase tracking-widest animate-pulse">
                    SYNCING CASINO...
                </div>
                
                <!-- 2 PLAYER PROFILES -->
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-black/80 p-4 rounded-xl border border-yellow-800/50 shadow-inner flex flex-col items-center text-center">
                        <span class="text-[10px] text-gray-400 font-bold tracking-widest mb-1">WHITE PLAYER ♔</span>
                        <span id="white-name" class="font-bold text-lg text-white truncate w-full">---</span>
                        <span id="white-rating" class="text-sm text-yellow-500 font-mono mt-1">---</span>
                    </div>
                    <div class="bg-black/80 p-4 rounded-xl border border-yellow-800/50 shadow-inner flex flex-col items-center text-center">
                        <span class="text-[10px] text-gray-400 font-bold tracking-widest mb-1">BLACK PLAYER ♚</span>
                        <span id="black-name" class="font-bold text-lg text-white truncate w-full">---</span>
                        <span id="black-rating" class="text-sm text-yellow-500 font-mono mt-1">---</span>
                    </div>
                </div>

                <!-- MAIN BETS -->
                <h3 class="text-center font-bold text-yellow-500 uppercase tracking-[0.2em] mb-4 text-xs">Game Winner</h3>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <button class="bet-btn group p-4 rounded-xl flex flex-col items-center shadow-lg" data-group="main" data-bet="White Win" data-decimal="2.00">
                        <span class="chess-icon text-5xl text-white drop-shadow-md">♔</span>
                        <span class="font-bold text-amber-100 mt-2 uppercase">White</span>
                        <span class="text-yellow-500 text-sm font-black mt-1">1:1</span>
                    </button>
                    <button class="bet-btn group p-4 rounded-xl flex flex-col items-center shadow-lg" data-group="main" data-bet="Black Win" data-decimal="2.00">
                        <span class="chess-icon text-5xl text-gray-400 drop-shadow-md">♚</span>
                        <span class="font-bold text-amber-100 mt-2 uppercase">Black</span>
                        <span class="text-yellow-500 text-sm font-black mt-1">1:1</span>
                    </button>
                </div>

                <!-- SIDE BETS -->
                <div class="relative flex items-center py-2 mb-4">
                    <div class="flex-grow border-t-2 border-yellow-900/40"></div>
                    <span class="flex-shrink-0 mx-4 text-yellow-600 text-xs font-black uppercase tracking-[0.2em]">Execution Method (Side Bets)</span>
                    <div class="flex-grow border-t-2 border-yellow-900/40"></div>
                </div>

                <div class="grid grid-cols-3 gap-3 mb-8">
                    <button class="bet-btn group p-3 rounded-xl flex flex-col items-center justify-center" data-group="side" data-bet="Queen Mate" data-decimal="2.00">
                        <span class="chess-icon text-3xl text-amber-100">♕</span>
                        <span class="text-[9px] font-bold text-amber-200 mt-2 uppercase tracking-wide">Queen Mate</span>
                        <span class="text-lg font-black text-yellow-500 mt-1">1:1</span>
                    </button>
                    <button class="bet-btn group p-3 rounded-xl flex flex-col items-center justify-center" data-group="side" data-bet="Rook Mate" data-decimal="4.00">
                        <span class="chess-icon text-3xl text-amber-100">♖</span>
                        <span class="text-[9px] font-bold text-amber-200 mt-2 uppercase tracking-wide">Rook Mate</span>
                        <span class="text-lg font-black text-yellow-500 mt-1">1:3</span>
                    </button>
                    <button class="bet-btn group p-3 rounded-xl flex flex-col items-center justify-center" data-group="side" data-bet="Bishop Mate" data-decimal="7.00">
                        <span class="chess-icon text-3xl text-amber-100">♗</span>
                        <span class="text-[9px] font-bold text-amber-200 mt-2 uppercase tracking-wide">Bishop Mate</span>
                        <span class="text-lg font-black text-yellow-500 mt-1">1:6</span>
                    </button>
                    <button class="bet-btn group p-3 rounded-xl flex flex-col items-center justify-center" data-group="side" data-bet="Knight Mate" data-decimal="7.00">
                        <span class="chess-icon text-3xl text-amber-100">♘</span>
                        <span class="text-[9px] font-bold text-amber-200 mt-2 uppercase tracking-wide">Knight Mate</span>
                        <span class="text-lg font-black text-yellow-500 mt-1">1:6</span>
                    </button>
                    <button class="bet-btn group p-3 rounded-xl flex flex-col items-center justify-center" data-group="side" data-bet="Pawn Mate" data-decimal="11.00">
                        <span class="chess-icon text-3xl text-amber-100">♙</span>
                        <span class="text-[9px] font-bold text-amber-200 mt-2 uppercase tracking-wide">Pawn Mate</span>
                        <span class="text-lg font-black text-yellow-500 mt-1">1:10</span>
                    </button>
                    <button class="bet-btn group p-3 rounded-xl flex flex-col items-center justify-center" data-group="side" data-bet="Timeout Mate" data-decimal="3.00">
                        <span class="text-3xl text-amber-100">⏱️</span>
                        <span class="text-[9px] font-bold text-amber-200 mt-2 uppercase tracking-wide">Timeout</span>
                        <span class="text-lg font-black text-yellow-500 mt-1">1:2</span>
                    </button>
                </div>
                
                <!-- PAYMENT MODULE -->
                <div id="payment-module" class="bg-black/80 p-5 rounded-xl border border-yellow-800/50 hidden">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-black text-yellow-600 uppercase">Total Multiplier: <span id="total-odds" class="text-white text-lg">0.00x</span></span>
                        <span class="text-xs font-black text-yellow-600 uppercase">To Win: <span id="potential-win" class="text-green-400 text-lg">$0.00</span></span>
                    </div>
                    <input type="number" id="stake" min="1" placeholder="Enter Stake ($)" class="w-full p-4 bg-[#0a2a18] text-2xl text-white font-black outline-none border-2 border-yellow-800 focus:border-yellow-500 rounded-xl transition-colors mb-4 text-center">
                    <button id="pay-btn" class="w-full bg-gradient-to-b from-yellow-400 to-yellow-600 hover:to-yellow-500 text-black font-black p-4 rounded-xl uppercase text-xl shadow-lg active:scale-95 transition-transform border-2 border-yellow-200">
                        🎲 Place Bet
                    </button>
                </div>
                
                <p class="text-[11px] text-red-400 mt-4 text-center font-bold uppercase tracking-widest bg-red-900/20 py-2 rounded-lg border border-red-900/50">
                    ⚠️ NOTE: DRAW/STALEMATE = HOUSE WINS ⚠️
                </p>
            </div>

            <!-- BETTING HISTORY -->
            <div class="casino-panel p-6 rounded-2xl">
                <h2 class="text-yellow-500 font-black uppercase tracking-widest mb-4 flex justify-between items-center border-b border-yellow-800/50 pb-2">
                    <span>🎟️ Active & Past Bets</span>
                    <button id="clear-history" class="text-[10px] bg-red-900/50 hover:bg-red-800 px-3 py-1 rounded text-red-200 uppercase font-bold transition-colors border border-red-800">Clear History</button>
                </h2>
                <div id="bets-list" class="space-y-3 max-h-[300px] overflow-y-auto pr-2">
                    <!-- Injected bets -->
                </div>
            </div>

        </div>

        <!-- RIGHT COLUMN: NATIVE LICHESS TV -->
        <div class="flex flex-col sticky top-6">
            <div class="bg-gradient-to-b from-yellow-500 to-yellow-700 text-black text-center font-black text-xs py-3 rounded-t-xl uppercase tracking-widest border-x-4 border-t-4 border-yellow-600 shadow-md">
                📺 Lichess TV Broadcast
            </div>
            <!-- Używamy natywnego źródła TV, aby Lichess automatycznie przełączał gry. Zero problemów z ładowaniem! -->
            <iframe id="game-frame" src="https://lichess.org/tv/frame?theme=brown&bg=dark" class="w-full aspect-[400/444] rounded-b-xl border-x-4 border-b-4 border-yellow-600 bg-black shadow-2xl" allowtransparency="true" frameborder="0"></iframe>
        </div>
        
    </main>

    <script>
        // ---------------------------------------------------------
        // 1. WALLET & HISTORY SYSTEM
        // ---------------------------------------------------------
        let balance = parseFloat(localStorage.getItem('chessbet_balance')) || 1000.00;
        let betsHistory = JSON.parse(localStorage.getItem('chessbet_history')) || [];
        
        function updateBalance(newAmount) {
            balance = newAmount;
            localStorage.setItem('chessbet_balance', balance.toFixed(2));
            document.getElementById('wallet-balance').textContent = `$${balance.toFixed(2)}`;
        }

        function saveHistory() {
            localStorage.setItem('chessbet_history', JSON.stringify(betsHistory));
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('bets-list');
            container.innerHTML = '';
            
            if (betsHistory.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 text-sm py-4 italic font-bold">No bets placed yet.</p>';
                return;
            }

            [...betsHistory].reverse().forEach(bet => {
                let statusColor = "text-yellow-500";
                let statusText = "IN PLAY";
                let bgClass = "bg-black/50 border-yellow-800/50";

                if (bet.status === 'won') {
                    statusColor = "text-green-400";
                    statusText = "WON (+$" + bet.potentialWin.toFixed(2) + ")";
                    bgClass = "bg-green-900/20 border-green-700/50";
                } else if (bet.status === 'lost') {
                    statusColor = "text-red-500";
                    statusText = "LOST";
                    bgClass = "bg-red-900/20 border-red-800/50";
                }

                const betNames = bet.bets.map(b => b.type).join(' + ');

                container.innerHTML += `
                    <div class="p-3 rounded-xl border ${bgClass} flex justify-between items-center text-sm shadow-sm">
                        <div>
                            <span class="font-bold text-white uppercase">${betNames}</span>
                            <span class="text-xs text-gray-400 ml-2">Stake: $${bet.stake.toFixed(2)}</span>
                            <div class="text-[10px] text-gray-500 mt-1">Game ID: ${bet.gameId}</div>
                        </div>
                        <div class="font-black ${statusColor} text-right text-xs sm:text-sm">
                            ${statusText}
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('clear-history').onclick = () => {
            if(confirm("Are you sure you want to clear your past betting history? Active bets will remain.")) {
                betsHistory = betsHistory.filter(b => b.status === 'pending'); 
                saveHistory();
            }
        };

        updateBalance(balance);
        renderHistory();

        // ---------------------------------------------------------
        // 2. LICHESS API (BACKGROUND SYNC ONLY)
        // ---------------------------------------------------------
        let currentLiveId = null;

        async function fetchGameData() {
            try {
                const res = await fetch('https://lichess.org/api/tv/channels?_=' + Date.now());
                if (!res.ok) throw new Error("API Fetch failed");
                const data = await res.json();
                
                // Ponieważ natywna ramka (TV) priorytetuje "best" (Top Rated), skrypt nasłuchuje tego kanału.
                const game = data.best || data.blitz || Object.values(data)[0];

                if (game && game.gameId !== currentLiveId) {
                    
                    if (currentLiveId !== null) {
                        settleGame(currentLiveId);
                    }

                    currentLiveId = game.gameId;
                    
                    document.getElementById('status').textContent = "BETTING OPEN";
                    document.getElementById('status').className = "text-center text-sm font-black text-green-400 mb-6 uppercase tracking-widest";

                    // Wykorzystujemy info bezpośrednio z API kanałów, żeby nie robić 404
                    if (game.color === 'white') {
                        document.getElementById('white-name').textContent = game.user.name;
                        document.getElementById('white-rating').textContent = "RATING: " + game.rating;
                        document.getElementById('black-name').textContent = "Opponent";
                        document.getElementById('black-rating').textContent = "RATING: ---";
                    } else {
                        document.getElementById('black-name').textContent = game.user.name;
                        document.getElementById('black-rating').textContent = "RATING: " + game.rating;
                        document.getElementById('white-name').textContent = "Opponent";
                        document.getElementById('white-rating').textContent = "RATING: ---";
                    }

                    // Próbujemy dociągnąć drugiego gracza "miękko"
                    fetchOpponentProfileSafely(game.gameId);
                }
            } catch (e) {
                // Skrypt milczy by nie psuć widoku.
            }
            setTimeout(fetchGameData, 5000); 
        }

        async function fetchOpponentProfileSafely(gameId) {
            try {
                const res = await fetch(`https://lichess.org/game/export/${gameId}?tags=true&clocks=false&evals=false&moves=false`, {
                    headers: { 'Accept': 'application/json' }
                });
                if(res.ok) {
                    const gameData = await res.json();
                    document.getElementById('white-name').textContent = gameData.players?.white?.user?.name || 'Anonymous';
                    document.getElementById('white-rating').textContent = "RATING: " + (gameData.players?.white?.rating || '---');
                    document.getElementById('black-name').textContent = gameData.players?.black?.user?.name || 'Anonymous';
                    document.getElementById('black-rating').textContent = "RATING: " + (gameData.players?.black?.rating || '---');
                }
            } catch (e) {
                // Jeśli API zablokuje eksport, imiona zostaną te podane na początku (featured + opponent)
            }
        }

        async function settleGame(endedGameId, retries = 3) {
            try {
                const res = await fetch(`https://lichess.org/game/export/${endedGameId}?tags=true&clocks=false&evals=false&moves=true`, {
                    headers: { 'Accept': 'application/json' }
                });
                
                if (res.status === 404 && retries > 0) {
                    setTimeout(() => settleGame(endedGameId, retries - 1), 4000);
                    return;
                }

                if (res.ok) {
                    const game = await res.json();
                    const actualWinner = game.winner || 'draw'; 
                    let actualMethod = 'Unknown';
                    
                    if (game.status === 'outoftime') actualMethod = 'Timeout Mate';
                    else if (game.status === 'mate') {
                        const moves = game.moves ? game.moves.split(' ') : [];
                        const lastMove = moves[moves.length - 1] || '';
                        if (lastMove.includes('Q') || lastMove.includes('=Q')) actualMethod = 'Queen Mate';
                        else if (lastMove.includes('R') || lastMove.includes('=R')) actualMethod = 'Rook Mate';
                        else if (lastMove.includes('B') || lastMove.includes('=B')) actualMethod = 'Bishop Mate';
                        else if (lastMove.includes('N') || lastMove.includes('=N')) actualMethod = 'Knight Mate';
                        else if (lastMove.match(/^[a-h]/)) actualMethod = 'Pawn Mate'; 
                    } else if (game.status === 'draw' || game.status === 'stalemate') {
                        actualMethod = 'Draw';
                    } else if (game.status === 'resign') {
                        actualMethod = 'Resignation';
                    }

                    let newlyWon = 0;
                    let processedAny = false;

                    betsHistory.forEach(ticket => {
                        if (ticket.gameId === endedGameId && ticket.status === 'pending') {
                            processedAny = true;
                            let ticketWon = true;

                            if (actualWinner === 'draw') {
                                ticketWon = false;
                            } else {
                                ticket.bets.forEach(b => {
                                    if (b.group === 'main') {
                                        if (b.type === 'White Win' && actualWinner !== 'white') ticketWon = false;
                                        if (b.type === 'Black Win' && actualWinner !== 'black') ticketWon = false;
                                    } else if (b.group === 'side') {
                                        if (b.type !== actualMethod) ticketWon = false;
                                    }
                                });
                            }

                            if (ticketWon) {
                                ticket.status = 'won';
                                newlyWon += ticket.potentialWin;
                            } else {
                                ticket.status = 'lost';
                            }
                        }
                    });

                    if (processedAny) {
                        if (newlyWon > 0) {
                            updateBalance(balance + newlyWon);
                        }
                        saveHistory(); 
                    }
                }
            } catch(e) {
                // Silent catch
            }
        }

        // ---------------------------------------------------------
        // 3. BETTING INTERFACE LOGIC
        // ---------------------------------------------------------
        let selections = { main: null, side: null };
        const buttons = document.querySelectorAll('.bet-btn');
        const stakeInput = document.getElementById('stake');
        const totalOddsEl = document.getElementById('total-odds');
        const potentialWinEl = document.getElementById('potential-win');
        const paymentModule = document.getElementById('payment-module');

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                const group = btn.getAttribute('data-group');
                
                if (selections[group] === btn) {
                    selections[group] = null;
                    btn.classList.remove('glow-casino-active');
                } else {
                    if (selections[group]) selections[group].classList.remove('glow-casino-active');
                    selections[group] = btn;
                    btn.classList.add('glow-casino-active');
                }
                updateSlip();
            });
        });

        stakeInput.addEventListener('input', calculateWin);

        function updateSlip() {
            let totalOdds = 1.0;
            let betsCount = 0;
            
            Object.values(selections).forEach(btn => {
                if (btn) {
                    betsCount++;
                    totalOdds *= parseFloat(btn.getAttribute('data-decimal'));
                }
            });

            if (betsCount > 0) {
                paymentModule.classList.remove('hidden');
                totalOddsEl.textContent = totalOdds.toFixed(2) + "x";
                calculateWin();
            } else {
                paymentModule.classList.add('hidden');
            }
        }

        function calculateWin() {
            const stake = parseFloat(stakeInput.value) || 0;
            const totalOdds = parseFloat(totalOddsEl.textContent) || 0;
            potentialWinEl.textContent = "$" + (stake * totalOdds).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        document.getElementById('pay-btn').onclick = () => {
            if (!currentLiveId) return alert("Please wait for a live game to sync.");
            
            const stake = parseFloat(stakeInput.value);
            if (!stake || isNaN(stake) || stake <= 0) return alert("Enter a valid stake!");
            if (stake > balance) return alert("Insufficient funds in wallet!");

            let currentBets = [];
            Object.values(selections).forEach(btn => {
                if (btn) {
                    currentBets.push({ 
                        type: btn.getAttribute('data-bet'), 
                        group: btn.getAttribute('data-group') 
                    });
                }
            });

            if (currentBets.length === 0) return;

            updateBalance(balance - stake);
            const totalOdds = parseFloat(totalOddsEl.textContent);

            const bet = {
                id: Math.random().toString(36).substr(2, 6).toUpperCase(),
                gameId: currentLiveId,
                bets: currentBets,
                stake: stake,
                potentialWin: stake * totalOdds,
                status: 'pending'
            };

            betsHistory.push(bet);
            saveHistory();
            
            selections = { main: null, side: null };
            buttons.forEach(btn => btn.classList.remove('glow-casino-active'));
            stakeInput.value = '';
            updateSlip();
        };

        // Start TV Sync
        fetchGameData();

    </script>
</body>
</html>
