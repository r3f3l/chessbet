<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gambit. - Chess coaching through the thrill of duels</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121110;
            --bg-panel: #1b1a18;
            --bg-card: #23221f;
            --bg-card-hover: #2a2926;
            --text-main: #f5f5f5;
            --text-muted: #a1a09d;
            --accent-gold: #e2b34a;
            --accent-gold-hover: #cfa13e;
            --border-color: #302f2b;
            --status-green: #2e7d32;
            --status-green-bg: #1b3b22;
        }

        /* ... (pozostałe style CSS bez zmian, zaktualizowany widok Settings poniżej) ... */
        
        .settings-list {
            list-style: none;
            max-width: 600px;
            margin: 0 auto;
        }
        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .settings-item i { font-size: 1.2rem; color: var(--accent-gold); }
    </style>
</head>
<body>
    <!-- ... (Nagłówek i reszta strony) ... -->
    
    <!-- PAGE: SETTINGS (Nowy widok) -->
    <div id="view-settings" class="page-view">
        <section>
            <div class="section-header">
                <h2 class="section-title">Settings</h2>
            </div>
            <div class="settings-list">
                <div class="settings-item">
                    <span><i class="fa-solid fa-user"></i> Profile Details</span>
                    <button class="btn-secondary">Edit</button>
                </div>
                <div class="settings-item">
                    <span><i class="fa-solid fa-bell"></i> Notifications</span>
                    <input type="checkbox" checked>
                </div>
                <div class="settings-item">
                    <span><i class="fa-solid fa-shield-halved"></i> Privacy</span>
                    <button class="btn-secondary">Manage</button>
                </div>
            </div>
        </section>
    </div>

    <!-- ... (skrypty nawigacyjne) ... -->
</body>
</html>
